<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurrencyVista | Currency Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="header">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <h1>CurrencyVista</h1>
            <p>Real-Time Currency Converter</p>
        </div>
        <div class="converter-card">
            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="amount" placeholder="Enter amount" value="1" min="1">
            </div>
            <div class="currency-group">
                <div class="currency-box">
                    <label>From</label>
                    <select id="fromCurrency"></select>
                </div>
                <button id="swapBtn" title="Swap Currency">
                    <i class="fa-solid fa-right-left"></i>
                </button>
                <div class="currency-box">
                    <label>To</label>
                    <select id="toCurrency"></select>
                </div>
            </div>
            <button id="convertBtn" class="convert-btn">
                Convert Currency
            </button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Fetching latest exchange rate...</p>
            </div>
            <div class="result-card">
                <h2 id="result">
                    1 USD = 83.00 INR
                </h2>
                <p id="rate">
                    Exchange Rate: 1 USD = 83 INR
                </p>
                <p id="updatedTime">
                    Last Updated: --
                </p>
            </div>
        </div>
        <footer>
            <p>
                <i class="fa-solid fa-globe"></i>
                Live Exchange Rates | CurrencyVista
            </p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
