<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
        }
        #main #item {
            border: 2px solid;
            height: 300px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #main #item img {
            float: left;
            width: auto;
            height: 80%;

        }
    </style>
</head>
<body>
    <div id="main">

    </div>
    <script src="./user.js"></script>
</body>
</html>
