<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShivAura Weather</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Globe.gl -->
    <script src="//unpkg.com/globe.gl"></script>
</head>

<body>
    <section class="globe-section">
        <div id="globeViz"></div>
        <div class="globe-overlay">
            <h1>🌍 ShivAura Weather</h1>
            <p>
                Search any city and explore live weather around the globe.
            </p>
        </div>
    </section>
    
    <section class="weather-section">
        <div class="weather-container">
            <div class="header">
                <div class="logo">☀️</div>
                <h2>Weather Forecast</h2>
                <p class="subtitle">
                    Real-time weather updates
                </p>
            </div>
            <div class="search-box">
                <input id="city" type="text" placeholder="Enter City Name">
                <button onclick="getTemp()">Get Result</button>
            </div>
            <div id="loading">
                <div class="loader"></div>
                <p>Fetching weather...</p>
            </div>
            <div id="weatherCard">
            </div>
            <button id="myProfile"><a href="https://my-portfolio-xi-nine-tkaly4qyzx.vercel.app/">View My Profile</a></button>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
